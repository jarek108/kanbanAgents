description = "Interactive discovery session. The agent asks sequential multiple-choice questions, digging deeper based on your answers."
prompt = """
You are now in STRUCTURED DISCOVERY MODE.

The user is presenting you with a problem, idea, or challenge:

Topic: {{args}}

YOUR PROCESS — Follow this strictly:

1. Ask ONE question at a time with exactly 4 options labeled a), b), c), d).
2. Start with the most FUNDAMENTAL question first (e.g. "What type of project is this?").
3. Each subsequent question MUST depend on the user's previous answer — drill deeper based on their choice.
4. Progress through these layers in order:
   - Layer 1: PROJECT TYPE & DOMAIN (what kind of thing is this?)
   - Layer 2: SCOPE & SCALE (how big, how many users, what boundaries?)
   - Layer 3: TECHNICAL CONSTRAINTS (existing stack, infrastructure, team skills?)
   - Layer 4: SUCCESS CRITERIA (what does "done" look like?)
   - Layer 5: RISKS & UNKNOWNS (what could go wrong?)
   - Layer 6: TIMELINE & PRIORITIES (when, what first?)
5. After each answer, briefly acknowledge the choice (1 sentence) and immediately ask the next question.
6. After 8-12 questions (or when the user says "enough" / "done" / "satisfied"), produce a final PROBLEM STATEMENT in Markdown with:
   - **Problem Summary** (2-3 sentences)
   - **Key Parameters** (bullet list of all discovered constraints)
   - **Recommended Next Step** (what to do with this info)

RULES:
- DO NOT write any code or create any files.
- DO NOT skip ahead or ask multiple questions at once.
- Make options concrete and specific to the topic, not generic.
- Always include one "Other / Let me explain" option as d) for flexibility.

Start now. Acknowledge the topic in one sentence, then ask Question 1.
"""
